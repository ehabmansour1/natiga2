<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نتيجة الشهادة الإعدادية — بوابة الاستعلام</title>
  <meta name="description" content="بوابة الاستعلام عن نتيجة الشهادة الإعدادية بالاسم أو برقم الجلوس." />

  <!-- Inline SVG favicon: an eight-point khatam (seal) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230e4a42'/%3E%3Cpath d='M16 5l2.8 5.1L24 7.9l-2.2 5.3L27 16l-5.2 2.8L24 24l-5.2-2.2L16 27l-2.8-5.2L8 24l2.2-5.2L5 16l5.2-2.8L8 7.9l5.2 2.2z' fill='%23c89b3c'/%3E%3Ccircle cx='16' cy='16' r='3.4' fill='%230e4a42'/%3E%3C/svg%3E" />

  <!-- Distinctive Arabic type: Aref Ruqaa (display), Reem Kufi (headings/numerals), Tajawal (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Reem+Kufi:wght@400..700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Decorative background layers -->
  <div class="bg-grain" aria-hidden="true"></div>
  <div class="bg-pattern" aria-hidden="true"></div>

  <!-- ░░ Masthead ░░ -->
  <header class="masthead no-print">
    <div class="masthead__inner">
      <a class="brand" href="#" id="brandHome" aria-label="الصفحة الرئيسية">
        <span class="brand__seal" aria-hidden="true">
          <svg viewBox="0 0 48 48" width="40" height="40">
            <path d="M24 3l4.3 7.7 8.6-3.6-3.6 8.6L41 24l-7.7 4.3 3.6 8.6-8.6-3.6L24 45l-4.3-7.7-8.6 3.6 3.6-8.6L7 24l7.7-4.3-3.6-8.6 8.6 3.6z" fill="currentColor"/>
            <circle cx="24" cy="24" r="6" fill="var(--ink)"/>
            <circle cx="24" cy="24" r="2.6" fill="currentColor"/>
          </svg>
        </span>
        <span class="brand__text">
          <strong>بوابة النتائج</strong>
          <small>الاستعلام عن الشهادة الإعدادية</small>
        </span>
      </a>
      <div class="masthead__year">العام الدراسي <span dir="ltr">2025 / 2026</span></div>
    </div>
  </header>

  <main class="stage">

    <!-- ░░ Search view ░░ -->
    <section class="search-view" id="searchView">
      <div class="hero">
        <p class="hero__kicker">نتيجة آخر العام</p>
        <h1 class="hero__title">نتيجة الشهادة الإعدادية</h1>
        <div class="ornament" aria-hidden="true">
          <span></span><b>۞</b><span></span>
        </div>
        <form class="search-card" id="searchForm" autocomplete="off" novalidate>
          <div class="seg" role="tablist" aria-label="طريقة البحث">
            <button type="button" class="seg__btn is-active" data-mode="seat" role="tab" aria-selected="true">
              برقم الجلوس
            </button>
            <button type="button" class="seg__btn" data-mode="name" role="tab" aria-selected="false">
              بالاسم
            </button>
            <span class="seg__thumb" aria-hidden="true"></span>
          </div>

          <div class="field">
            <input
              id="searchInput"
              class="field__input"
              type="text"
              inputmode="numeric"
              placeholder="أدخل رقم الجلوس"
              aria-label="رقم الجلوس"
              spellcheck="false"
            />
            <button type="submit" class="field__btn" id="searchBtn">
              <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
                <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <span>بحث</span>
            </button>
          </div>
          <p class="field__hint" id="searchHint">اكتب رقم الجلوس المكوّن من أرقام ثم اضغط بحث.</p>
        </form>

        <div class="data-badge" id="dataBadge" hidden></div>
      </div>

      <!-- States: loading / not-found / multiple name matches -->
      <div class="panel" id="statePanel" hidden></div>
      <div class="matches" id="matchesPanel" hidden></div>
    </section>

    <!-- ░░ Result view ░░ -->
    <section class="result-view" id="resultView" hidden>
      <div class="result-actions no-print">
        <button class="action action--gold" id="certBtn">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M12 15a5 5 0 1 0-5-5 5 5 0 0 0 5 5zM9 13.5L7.5 21l4.5-2.2L16.5 21 15 13.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          تحميل شهادة تقدير
        </button>
        <button class="action action--solid" id="printBtn">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M7 9V3h10v6M7 18H5a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2M7 14h10v7H7z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          طباعة النتيجة
        </button>
        <button class="action action--ghost" id="backBtn">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M14 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          بحث جديد
        </button>
      </div>

      <article class="certificate" id="certificate" aria-live="polite"><!-- rendered by app.js --></article>
    </section>

  </main>

  <footer class="site-foot no-print">
    <div class="visit-counter" id="counterWrap" hidden>
      <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      <span>عدد الزيارات</span>
      <strong id="visitCount">—</strong>
    </div>
    <p>تم التطوير بواسطة
      <a class="dev-credit" href="https://wa.me/201119216865" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5-1.3A10 10 0 1 0 12 2zm0 18.2a8.2 8.2 0 0 1-4.2-1.2l-.3-.2-3 .8.8-2.9-.2-.3A8.2 8.2 0 1 1 12 20.2zm4.5-6.1c-.2-.1-1.5-.7-1.7-.8s-.4-.1-.5.1-.6.8-.8 1-.3.2-.5.1a6.7 6.7 0 0 1-2-1.2 7.4 7.4 0 0 1-1.4-1.7c-.1-.2 0-.4.1-.5l.4-.4.2-.4v-.4l-.8-1.8c-.2-.5-.4-.4-.5-.4h-.5a.9.9 0 0 0-.7.3 2.8 2.8 0 0 0-.9 2.1 4.9 4.9 0 0 0 1 2.6 11.2 11.2 0 0 0 4.3 3.8c2 .8 2 .5 2.4.5a2.5 2.5 0 0 0 1.6-1.1 2 2 0 0 0 .1-1.1c0-.1-.2-.2-.4-.3z"/></svg>
        إيهاب منصور
      </a>
    </p>
  </footer>

  <!-- بيانات تجريبية احتياطية إذا تعذّر تحميل قاعدة البيانات -->
  <script src="data/sample-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
